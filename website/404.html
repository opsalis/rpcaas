<!DOCTYPE html>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #0066ff;
      --blue-dim: #0052cc;
      --blue-light: #e8f0fe;
      --text: #1a1a2e;
      --text-secondary: #555770;
      --bg: #ffffff;
      --bg-alt: #f7f8fc;
      --border: #e4e7ec;
      --radius: 10px;
    }
    html, body { height: 100%; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; min-height: 100vh; }
    a { color: var(--blue); text-decoration: none; }

    nav { background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 16px 0; }
    nav .inner { max-width: 1120px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.25rem; letter-spacing: -0.5px; color: var(--text); }
    .logo svg { width: 32px; height: 32px; }
    .nav-links { display: flex; gap: 24px; font-size: 0.9rem; font-weight: 500; color: var(--text-secondary); }
    .nav-links a { color: var(--text-secondary); }
    .nav-links a:hover { color: var(--text); }

    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 64px 24px; }
    .error-box { text-align: center; max-width: 480px; }
    .error-code { font-size: 6rem; font-weight: 800; color: var(--blue-light); letter-spacing: -4px; line-height: 1; margin-bottom: 16px; font-family: 'Inter', sans-serif; }
    .error-title { font-size: 1.75rem; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; }
    .error-desc { color: var(--text-secondary); margin-bottom: 32px; font-size: 1rem; }
    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 12px 28px; border-radius: var(--radius); font-weight: 600; font-size: 0.95rem; transition: all 0.2s; cursor: pointer; border: none; }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { background: var(--blue-dim); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,102,255,0.25); }
    .helpful-links { display: flex; gap: 24px; justify-content: center; margin-top: 24px; font-size: 0.9rem; color: var(--text-secondary); }
    .helpful-links a { color: var(--text-secondary); }
    .helpful-links a:hover { color: var(--blue); }

    footer { border-top: 1px solid var(--border); padding: 24px 0; text-align: center; font-size: 0.8rem; color: #94a3b8; }
    footer a { color: #94a3b8; }
    footer a:hover { color: var(--text-secondary); }
  </style>
</head>

      <a href="/" class="btn btn-primary">Go to Homepage</a>
      <div class="helpful-links">

        <a href="/account.html">Account</a>
