name = "chainrpc-billing"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

account_id = "a36738aa5ac5c9338878e4eb8d79eaa2"

workers_dev = true

# Testing on Demo L2 (845302). For mainnet: switch to Base (8453).
[vars]
BILLING_RPC      = "https://demo.chainrpc.net"
BILLING_CONTRACT = "TODO_REDEPLOY_TO_DEMO_L2"
MOCK_USDC        = "0x75E9b48F4a8f8E10f6d46a7D582aC2bEc85B7d81"
TREASURY         = "0xFC1f07Dd7233fcc9d36562eCE8D3c1181AEcD2bf"

# Secrets (set via: wrangler secret put DEPLOYER_KEY)
# DEPLOYER_KEY     — private key for operator signing (via relay)
# OPERATOR_SECRET  — shared secret for operator-only endpoints

[[routes]]
pattern = "api.chainrpc.net/*"
zone_name = "chainrpc.net"
