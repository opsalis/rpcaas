apiVersion: v1
kind: Namespace
metadata:
  name: chainrpc
---
# DaemonSet: runs on EVERY k3s node (CDN-style caching + geo-routing)
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: chainrpc
  namespace: chainrpc
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 5m"
spec:
  selector:
    matchLabels:
      app: chainrpc
  template:
    metadata:
      labels:
        app: chainrpc
    spec:
      containers:
        - name: chainrpc
          image: opsalis/chainrpc:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3100
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3100"
            - name: CHAINRPC_DOMAIN
              value: chainrpc.net
            # Geo-routing: NODE_NAME is mapped to region in proxy/index.ts (NODE_NAME_TO_REGION map).
            # NODE_REGION env can override if set explicitly; otherwise inferred from NODE_NAME.
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # Internal key for Opsalis services (unlimited tier)
            - name: CHAINRPC_INTERNAL_KEY
              value: rpk_b79bf7a33b6baf60398b50b40265eafc
            # Own-chain RPC endpoints
            - name: L1_RPC_1
              value: http://l1-rpc.opsalis-l1.svc.cluster.local:8545
            - name: L1_RPC_2
              value: http://l1-rpc.opsalis-l1.svc.cluster.local:8545
            - name: L2_RPC_1
              value: http://l2-rpc.opsalis-l2-demo.svc.cluster.local:8545
            - name: DEMO_L2_RPC
              value: http://l2-rpc.opsalis-l2-demo.svc.cluster.local:8545
            - name: FREE_L2_RPC
              value: http://l2-rpc.opsalis-l2-free.svc.cluster.local:8545
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3100
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 3100
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: chainrpc
  namespace: chainrpc
spec:
  selector:
    app: chainrpc
  ports:
    - port: 3100
      targetPort: 3100
      protocol: TCP
---
# Traefik IngressRoute per chain FQDN
# External-DNS reads these and auto-creates Cloudflare DNS records
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: chainrpc-ethereum
  namespace: chainrpc
  annotations:
    external-dns.alpha.kubernetes.io/hostname: ethereum.chainrpc.net
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  entryPoints: [web, websecure]
  routes:
    - match: Host(`ethereum.chainrpc.net`)
      kind: Rule
      services:
        - name: chainrpc
          port: 3100
---
