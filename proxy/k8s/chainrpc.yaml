apiVersion: v1
kind: Namespace
metadata:
  name: chainrpc
---
# DaemonSet: runs on EVERY k3s node (CDN-style caching)
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: chainrpc
  namespace: chainrpc
spec:
  selector:
    matchLabels:
      app: chainrpc
  template:
    metadata:
      labels:
        app: chainrpc
    spec:
      containers:
        - name: chainrpc
          image: opsalis/chainrpc:latest
          ports:
            - containerPort: 3100
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3100"
            - name: CHAINRPC_DOMAIN
              value: chainrpc.net
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3100
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 3100
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: chainrpc
  namespace: chainrpc
spec:
  selector:
    app: chainrpc
  ports:
    - port: 3100
      targetPort: 3100
      protocol: TCP
---
# Traefik IngressRoute per chain FQDN
# External-DNS reads these and auto-creates Cloudflare DNS records
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: chainrpc-ethereum
  namespace: chainrpc
  annotations:
    external-dns.alpha.kubernetes.io/hostname: ethereum.chainrpc.net
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  entryPoints: [web, websecure]
  routes:
    - match: Host(`ethereum.chainrpc.net`)
      kind: Rule
      services:
        - name: chainrpc
          port: 3100
---
