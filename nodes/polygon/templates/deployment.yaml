apiVersion: apps/v1
kind: Deployment
metadata:
  name: polygon-node
  namespace: rpcaas
  labels:
    app: polygon-node
    chain: polygon
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: polygon-node
  template:
    metadata:
      labels:
        app: polygon-node
        chain: polygon
    spec:
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      containers:
        # Bor: Execution layer (EVM)
        - name: bor
          image: "{{ .Values.bor.image.repository }}:{{ .Values.bor.image.tag }}"
          imagePullPolicy: {{ .Values.bor.image.pullPolicy }}
          args:
            - server
            - --chain={{ .Values.network }}
            - --datadir=/data/bor
            - --syncmode=full
            - --gcmode=full
            - --http
            - --http.addr=0.0.0.0
            - --http.port={{ .Values.bor.ports.rpc }}
            - --http.corsdomain=*
            - --http.vhosts=*
            - --http.api=eth,net,web3,txpool,bor
            - --ws
            - --ws.addr=0.0.0.0
            - --ws.port={{ .Values.bor.ports.ws }}
            - --ws.origins=*
            - --ws.api=eth,net,web3,txpool,bor
            - --bor.heimdall=http://localhost:{{ .Values.heimdall.ports.rest }}
            - --bootnodes=enode://b8f1cc9c5d4403703fbf377116469667d2b1823c0daf16b7250aa576bacf399e42c3930ccfcb02c5df6879565a2b8931335565f0e8d3f8e72385ecf4a4bf160a3@3.36.224.80:30303,enode://8729e0c825f3d9cad382555f3e46dcff21af323e89025a0e6312df541f4a9e73abfa562d64906f5e59c51fe6f0501b3e61b07979e96fd6571e81f22c7043f8e8c@54.194.245.5:30303
            - --maxpeers=200
          ports:
            - containerPort: {{ .Values.bor.ports.rpc }}
              name: rpc
            - containerPort: {{ .Values.bor.ports.ws }}
              name: ws
          resources:
            {{- toYaml .Values.bor.resources | nindent 12 }}
          volumeMounts:
            - name: chain-data
              mountPath: /data

        # Heimdall: Consensus / checkpoint layer
        - name: heimdall
          image: "{{ .Values.heimdall.image.repository }}:{{ .Values.heimdall.image.tag }}"
          imagePullPolicy: {{ .Values.heimdall.image.pullPolicy }}
          args:
            - start
            - --home=/data/heimdall
            - --chain={{ .Values.network }}
            - --eth_rpc_url={{ .Values.ethRpcUrl }}
            - --rest-server
          ports:
            - containerPort: {{ .Values.heimdall.ports.rpc }}
              name: heimdall-rpc
            - containerPort: {{ .Values.heimdall.ports.rest }}
              name: heimdall-rest
          resources:
            {{- toYaml .Values.heimdall.resources | nindent 12 }}
          volumeMounts:
            - name: chain-data
              mountPath: /data

      volumes:
        - name: chain-data
          persistentVolumeClaim:
            claimName: polygon-chain-data
