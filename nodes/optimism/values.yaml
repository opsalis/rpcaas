# Optimism full node configuration
# Runs op-geth + op-node with OP Mainnet config

replicaCount: 1

opGeth:
  image:
    repository: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-geth
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "1000m"
      memory: "4Gi"
    limits:
      cpu: "2000m"
      memory: "8Gi"
  ports:
    rpc: 8545
    ws: 8546

opNode:
  image:
    repository: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-node
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "1000m"
      memory: "4Gi"
  ports:
    rpc: 9545

persistence:
  enabled: true
  storageClass: "local-path"
  size: 150Gi
  mountPath: /data
  hostPath: /mnt/chains/optimism

nodeSelector:
  role: rpc

service:
  type: ClusterIP
  port: 8545

l1RpcUrl: "http://ethereum-node.rpcaas.svc.cluster.local:8545"
network: op-mainnet
chainId: 10
