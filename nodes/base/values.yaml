# Base full node configuration
# Runs op-geth + op-node with Base mainnet config

replicaCount: 1

opGeth:
  image:
    repository: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-geth
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "1000m"
      memory: "4Gi"
    limits:
      cpu: "2000m"
      memory: "8Gi"
  ports:
    rpc: 8545
    ws: 8546
    metrics: 6060

opNode:
  image:
    repository: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-node
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "1000m"
      memory: "4Gi"
  ports:
    rpc: 9545

persistence:
  enabled: true
  storageClass: "local-path"
  size: 200Gi
  mountPath: /data
  hostPath: /mnt/chains/base

nodeSelector:
  role: rpc

service:
  type: ClusterIP
  port: 8545

# Base mainnet L1 RPC (for op-node to read L1)
l1RpcUrl: "http://ethereum-node.rpcaas.svc.cluster.local:8545"

# Base mainnet network config
network: base-mainnet
chainId: 8453
