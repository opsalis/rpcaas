apiVersion: v1
kind: Service
metadata:
  name: base-node
  namespace: rpcaas
  labels:
    app: base-node
    chain: base
spec:
  type: {{ .Values.service.type }}
  selector:
    app: base-node
  ports:
    - name: rpc
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.opGeth.ports.rpc }}
      protocol: TCP
    - name: ws
      port: 8546
      targetPort: {{ .Values.opGeth.ports.ws }}
      protocol: TCP
