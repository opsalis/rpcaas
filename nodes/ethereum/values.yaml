# Ethereum L1 full node configuration
# Runs Geth (execution) in full sync mode (NOT archive)
# Post-merge: requires a consensus client (Lighthouse/Prysm)

replicaCount: 1

geth:
  image:
    repository: ethereum/client-go
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "2000m"
      memory: "8Gi"
    limits:
      cpu: "4000m"
      memory: "16Gi"
  ports:
    rpc: 8545
    ws: 8546
    authrpc: 8551
    p2p: 30303
    metrics: 6060

lighthouse:
  image:
    repository: sigp/lighthouse
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "1000m"
      memory: "4Gi"
    limits:
      cpu: "2000m"
      memory: "8Gi"
  ports:
    http: 5052
    p2p: 9000
  checkpointSyncUrl: "https://beaconstate.ethstaker.cc"

persistence:
  enabled: true
  storageClass: "local-path"
  size: 1000Gi
  mountPath: /data
  hostPath: /mnt/chains/ethereum

nodeSelector:
  role: rpc

service:
  type: ClusterIP
  port: 8545

chainId: 1
network: mainnet
